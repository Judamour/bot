# /etc/nginx/sites-available/bot-trading
server {
    listen 80;
    server_name _;  # remplacer par ton IP ou domaine

    location / {
        auth_basic "Bot Trading Dashboard";
        auth_basic_user_file /etc/nginx/.htpasswd;

        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;

        # WebSocket (requis pour Socket.IO)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_cache_bypass $http_upgrade;
    }

    # Socket.IO — pas d'auth (même origine, connexion déjà authentifiée)
    location /socket.io/ {
        auth_basic off;
        proxy_pass http://127.0.0.1:5000/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }
}
