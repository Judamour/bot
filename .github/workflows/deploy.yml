name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 141.253.112.143
          username: ubuntu
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            sudo chown -R botuser:botuser /home/botuser/bot-trading
            sudo -u botuser bash -c "cd /home/botuser/bot-trading && git pull"
            sudo cp /home/botuser/bot-trading/deploy/nginx.conf /etc/nginx/sites-available/bot-trading
            sudo nginx -t && sudo systemctl reload nginx
            sudo cp /home/botuser/bot-trading/deploy/bot.service /etc/systemd/system/bot.service
            sudo cp /home/botuser/bot-trading/deploy/dashboard.service /etc/systemd/system/dashboard.service
            sudo systemctl daemon-reload
            sudo systemctl restart bot dashboard
            echo "✓ Déployé à $(date)"
