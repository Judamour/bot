name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 51.210.13.248
          username: ubuntu
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            sudo -u botuser bash -c "cd /home/botuser/bot-trading && git pull"
            sudo -u botuser bash -c "cd /home/botuser/bot-trading && venv/bin/pip install -q -r requirements.txt"
            sudo systemctl restart bot dashboard
            echo "✓ Déployé à $(date)"
